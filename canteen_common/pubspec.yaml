name: canteen_common
description: Shared common package for CanteenPay school apps (auth, API, services, models, widgets)
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP client
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # Local storage
  shared_preferences: ^2.2.2

  # Supabase for auth and database
  supabase_flutter: ^2.0.0

  # Connectivity
  connectivity_plus: ^6.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Device info
  device_info_plus: ^11.1.0
  package_info_plus: ^8.0.0
  uuid: ^4.5.1

  # Crash reporting
  firebase_crashlytics: ^4.0.0

  # Analytics
  firebase_analytics: ^11.0.0

  # Biometric auth
  local_auth: ^2.3.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Date formatting
  intl: ^0.20.2

  # Router
  go_router: ^17.0.1

  # Image caching
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
