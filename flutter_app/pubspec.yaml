name: canteen_pay
description: CanteenPay - School Cashless Payment System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Shared package
  canteen_common:
    path: ../canteen_common

  # Supabase for auth and database
  supabase_flutter: ^2.0.0

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^17.0.1

  # QR code generation (student)
  qr_flutter: ^4.1.0

  # QR code scanning (seller)
  mobile_scanner: ^5.0.0

  # Charts (parent spending)
  fl_chart: ^0.69.0

  # Date formatting
  intl: ^0.20.2

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
