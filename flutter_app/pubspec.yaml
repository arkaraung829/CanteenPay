name: canteen_pay
description: Paynow MM - School Cashless Payment System
publish_to: 'none'
version: 1.0.0+17

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Shared package
  canteen_common:
    path: ../canteen_common

  # Supabase for auth and database
  supabase_flutter: ^2.0.0

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^17.0.1

  # QR code generation (student)
  qr_flutter: ^4.1.0

  # QR code scanning (seller)
  mobile_scanner: ^6.0.0

  # Charts (parent spending)
  fl_chart: ^0.69.0

  # Date formatting
  intl: ^0.20.2

  # UUID
  uuid: ^4.5.1

  # Firebase services
  firebase_core: ^3.6.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.0.0
  firebase_analytics: ^11.0.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Biometric auth
  local_auth: ^2.3.0
  app_links: ^7.0.0

  # Image picker for photo upload
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/onboarding/

# App Icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: true
  windows:
    generate: false

# Splash screen configuration
flutter_native_splash:
  fullscreen: true
  background_image: "assets/onboarding/1_student_qr.png"
  background_image_dark: "assets/onboarding/1_student_qr.png"
  android_12:
    fullscreen: true
    background_image: "assets/onboarding/1_student_qr.png"
  ios: true
  android: true
