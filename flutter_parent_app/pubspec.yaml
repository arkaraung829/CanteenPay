name: flutter_parent_app
description: CanteenPay Parent - Monitor child spending, balance, and transaction history
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Shared package
  canteen_common:
    path: ../canteen_common

  # State management
  provider: ^6.1.1

  # Routing
  go_router: ^17.0.1

  # Date formatting
  intl: ^0.20.2

  # Charts for spending visualization
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
